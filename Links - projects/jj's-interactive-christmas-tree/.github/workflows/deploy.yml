name: Build and Deploy Christmas Tree

on:
  push:
    branches: [ master ]
    paths:
      - 'Links - projects/jj''s-interactive-christmas-tree/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        working-directory: 'Links - projects/jj''s-interactive-christmas-tree'
        run: npm install
        
      - name: Build
        working-directory: 'Links - projects/jj''s-interactive-christmas-tree'
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: 'Links - projects/jj''s-interactive-christmas-tree/dist'
          destination_dir: 'Links - projects/jj''s-interactive-christmas-tree'

